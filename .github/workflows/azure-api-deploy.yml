name: Deploy API to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'Wpd.api/**'
      - 'Wpd.Application/**'
      - 'Wpd.Domain/**'
      - 'Wpd.Infrastructure/**'
      - '.github/workflows/azure-api-deploy.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy API

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Wpd.api/Wpd.Api.csproj

      - name: Build
        run: dotnet build Wpd.api/Wpd.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Wpd.api/Wpd.Api.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wpd-api-dev'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
