<svg xmlns="http://www.w3.org/2000/svg" viewBox="150 10 500 520" width="800" height="600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="centerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bizGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#1a3a5c"/><stop offset="100%" stop-color="#0a1e36"/>
    </radialGradient>
    <radialGradient id="infoGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#0f3020"/><stop offset="100%" stop-color="#071a10"/>
    </radialGradient>
    <radialGradient id="peopleGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#3a2000"/><stop offset="100%" stop-color="#1a0e00"/>
    </radialGradient>
    <radialGradient id="orgGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2a1040"/><stop offset="100%" stop-color="#140820"/>
    </radialGradient>
  </defs>

  <!-- Connection lines between nodes -->
  <g stroke-width="1.5" stroke-dasharray="6,4" opacity="0.45">
    <line x1="230" y1="220" x2="570" y2="220" stroke="#4fc3f7"/>
    <line x1="230" y1="220" x2="230" y2="430" stroke="#4fc3f7"/>
    <line x1="570" y1="220" x2="570" y2="430" stroke="#81c784"/>
    <line x1="230" y1="430" x2="570" y2="430" stroke="#ffb74d"/>
  </g>
  <!-- Diagonal crosses -->
  <line x1="230" y1="220" x2="570" y2="430" stroke="#8080a0" stroke-width="1" stroke-dasharray="3,6" opacity="0.2"/>
  <line x1="570" y1="220" x2="230" y2="430" stroke="#8080a0" stroke-width="1" stroke-dasharray="3,6" opacity="0.2"/>

  <!-- Lines to center -->
  <g stroke-width="1.5" opacity="0.5">
    <line x1="230" y1="220" x2="400" y2="325" stroke="#4fc3f7"/>
    <line x1="570" y1="220" x2="400" y2="325" stroke="#81c784"/>
    <line x1="230" y1="430" x2="400" y2="325" stroke="#ffb74d"/>
    <line x1="570" y1="430" x2="400" y2="325" stroke="#ce93d8"/>
  </g>

  <!-- CENTER node -->
  <circle cx="400" cy="325" r="54" fill="#0e1e38" stroke="#f9a825" stroke-width="2.5" filter="url(#centerGlow)"/>
  <circle cx="400" cy="325" r="48" fill="none" stroke="#f9a825" stroke-width="0.5" opacity="0.3"/>
  <text x="400" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#fff9c4" letter-spacing="2">WHOLE</text>
  <text x="400" y="331" text-anchor="middle" font-size="12" font-weight="700" fill="#fff9c4" letter-spacing="2">PROCESS</text>
  <text x="400" y="346" text-anchor="middle" font-size="9" fill="#ffd54f" letter-spacing="1" opacity="0.8">DESIGN</text>

  <!-- BUSINESS SYSTEMS (top-left) -->
  <circle cx="230" cy="220" r="70" fill="url(#bizGrad)" stroke="#4fc3f7" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="230" cy="220" r="64" fill="none" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <rect x="218" y="188" width="24" height="30" rx="3" fill="none" stroke="#4fc3f7" stroke-width="1.8" opacity="0.85"/>
  <line x1="223" y1="198" x2="237" y2="198" stroke="#4fc3f7" stroke-width="1.5" opacity="0.85"/>
  <line x1="223" y1="205" x2="237" y2="205" stroke="#4fc3f7" stroke-width="1.5" opacity="0.85"/>
  <line x1="223" y1="212" x2="231" y2="212" stroke="#4fc3f7" stroke-width="1.5" opacity="0.85"/>
  <text x="230" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#4fc3f7" letter-spacing="0.5">BUSINESS</text>
  <text x="230" y="254" text-anchor="middle" font-size="10" fill="#90caf9" opacity="0.85">SYSTEMS</text>

  <!-- INFORMATION SYSTEMS (top-right) -->
  <circle cx="570" cy="220" r="70" fill="url(#infoGrad)" stroke="#81c784" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="570" cy="220" r="64" fill="none" stroke="#81c784" stroke-width="0.5" opacity="0.3"/>
  <!-- Database cylinder -->
  <ellipse cx="570" cy="191" rx="17" ry="5.5" fill="none" stroke="#81c784" stroke-width="1.8" opacity="0.85"/>
  <line x1="553" y1="191" x2="553" y2="213" stroke="#81c784" stroke-width="1.8" opacity="0.85"/>
  <line x1="587" y1="191" x2="587" y2="213" stroke="#81c784" stroke-width="1.8" opacity="0.85"/>
  <ellipse cx="570" cy="213" rx="17" ry="5.5" fill="none" stroke="#81c784" stroke-width="1.8" opacity="0.85"/>
  <ellipse cx="570" cy="202" rx="17" ry="5.5" fill="none" stroke="#81c784" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="570" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#81c784" letter-spacing="0.5">INFORMATION</text>
  <text x="570" y="254" text-anchor="middle" font-size="10" fill="#a5d6a7" opacity="0.85">SYSTEMS</text>

  <!-- PEOPLE SYSTEMS (bottom-left) -->
  <circle cx="230" cy="430" r="70" fill="url(#peopleGrad)" stroke="#ffb74d" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="230" cy="430" r="64" fill="none" stroke="#ffb74d" stroke-width="0.5" opacity="0.3"/>
  <circle cx="230" cy="403" r="9" fill="none" stroke="#ffb74d" stroke-width="1.8" opacity="0.85"/>
  <path d="M213 426 Q213 413 230 413 Q247 413 247 426" fill="none" stroke="#ffb74d" stroke-width="1.8" opacity="0.85"/>
  <text x="230" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#ffb74d" letter-spacing="0.5">PEOPLE</text>
  <text x="230" y="466" text-anchor="middle" font-size="10" fill="#ffcc80" opacity="0.85">SYSTEMS</text>

  <!-- ORGANIZATIONAL SYSTEMS (bottom-right) -->
  <circle cx="570" cy="430" r="70" fill="url(#orgGrad)" stroke="#ce93d8" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="570" cy="430" r="64" fill="none" stroke="#ce93d8" stroke-width="0.5" opacity="0.3"/>
  <rect x="563" y="400" width="14" height="11" rx="2" fill="none" stroke="#ce93d8" stroke-width="1.8" opacity="0.85"/>
  <rect x="547" y="418" width="13" height="10" rx="2" fill="none" stroke="#ce93d8" stroke-width="1.8" opacity="0.85"/>
  <rect x="580" y="418" width="13" height="10" rx="2" fill="none" stroke="#ce93d8" stroke-width="1.8" opacity="0.85"/>
  <line x1="570" y1="411" x2="570" y2="418" stroke="#ce93d8" stroke-width="1.5" opacity="0.75"/>
  <line x1="553" y1="418" x2="587" y2="418" stroke="#ce93d8" stroke-width="1.5" opacity="0.75"/>
  <text x="570" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#ce93d8" letter-spacing="0.5">ORGANIZATIONAL</text>
  <text x="570" y="466" text-anchor="middle" font-size="10" fill="#e1bee7" opacity="0.85">SYSTEMS</text>

  <!-- Title block with blueprint-style box -->
  <rect x="240" y="30" width="320" height="52" rx="3" fill="none" stroke="#80a9d1" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="400" y="58" text-anchor="middle" font-size="22" font-weight="700" fill="#012151" letter-spacing="3">FOUR SYSTEM LENSES</text>
  <text x="400" y="74" text-anchor="middle" font-size="10" fill="#305a84" letter-spacing="1.5" opacity="0.85">Interconnected · Simultaneous · Aligned</text>
</svg>
